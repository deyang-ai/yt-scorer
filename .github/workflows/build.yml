name: Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Verify dist output
        run: |
          test -f dist/manifest.json && echo "✓ manifest.json"
          test -f dist/content.js && echo "✓ content.js"
          test -f dist/service-worker.js && echo "✓ service-worker.js"
          test -f dist/popup/index.html && echo "✓ popup/index.html"
      - uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: dist/
